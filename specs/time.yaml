openapi: 3.0.0
info:
  title: Time Demo API
  version: 1.0.0
  description: Minimal public time sample used for the APIM demo.
servers:
  - url: https://worldtimeapi.org/api
paths:
  /timezone/{zone}:
    get:
      summary: Get the current time for a timezone
      operationId: getTime
      parameters:
        - in: path
          name: zone
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Time returned successfully
          content:
            application/json:
              schema:
                type: object
